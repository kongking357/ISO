<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Confirmed · ISO Boards</title>
<link rel="icon" type="image/webp" href="assets/navicon.webp">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: #0a0a0a;
    color: #f0ede8;
    font-family: 'DM Sans', sans-serif;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .bg-grid {
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(136,136,136,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(136,136,136,0.05) 1px, transparent 1px);
    background-size: 56px 56px;
    pointer-events: none; z-index: 0;
  }
  .iso-wm {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28vw;
    color: #f0ede8;
    opacity: 0.018;
    pointer-events: none; z-index: 0;
    white-space: nowrap;
  }
  .card {
    position: relative; z-index: 1;
    display: flex; flex-direction: column; align-items: center;
    text-align: center;
    padding: 60px 52px;
    border: 1px solid #2a2a2a;
    background: rgba(255,255,255,0.02);
    max-width: 480px; width: 90%;
    animation: fadeUp 0.7s ease 0.1s both;
  }
  .check {
    width: 56px; height: 56px;
    border: 1px solid #c9a84c;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 28px;
    animation: popIn 0.5s cubic-bezier(0.16,1,0.3,1) 0.4s both;
  }
  .check svg { color: #c9a84c; }
  .label {
    font-family: 'Space Mono', monospace;
    font-size: 0.64rem; letter-spacing: 0.22em;
    color: #c9a84c; text-transform: uppercase;
    margin-bottom: 14px;
  }
  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.4rem, 6vw, 3.8rem);
    letter-spacing: 0.05em;
    line-height: 1;
    margin-bottom: 18px;
  }
  p {
    font-size: 0.9rem; color: #888888;
    line-height: 1.8; max-width: 340px;
    margin-bottom: 36px;
  }
  .divider {
    width: 40px; height: 1px;
    background: #2a2a2a;
    margin-bottom: 36px;
  }
  .mono {
    font-family: 'Space Mono', monospace;
    font-size: 0.62rem; letter-spacing: 0.14em;
    color: #555555; text-transform: uppercase;
    margin-bottom: 28px;
  }
  .btn {
    display: inline-flex; align-items: center; gap: 10px;
    font-family: 'Space Mono', monospace; font-size: 0.7rem;
    letter-spacing: 0.15em; text-transform: uppercase;
    color: #f0ede8; background: #2a2a2a;
    border: 1px solid #555555;
    padding: 13px 28px; text-decoration: none;
    transition: background 0.2s, border-color 0.2s;
  }
  .btn:hover { background: #555555; border-color: #555555; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes popIn {
    from { opacity: 0; transform: scale(0.7); }
    to   { opacity: 1; transform: scale(1); }
  }
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="iso-wm">ISO</div>
<div class="card">
  <div class="check">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="20 6 9 17 4 12"/>
    </svg>
  </div>
  <div class="label">Payment Confirmed</div>
  <h1>Order Received</h1>
  <p>Your ISO Board is on its way to being crafted. We'll be in touch shortly with your order details and shipping timeline.</p>
  <div class="divider"></div>
  <div class="mono">Thank you for your order · info@isoboards.com</div>
  <a href="https://www.isoboards.com" class="btn">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    Back to ISO Boards
  </a>
</div>
</body>
</html>
